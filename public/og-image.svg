<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Urbanizadora Marmol MX</title>
  <desc id="desc">Infraestructura, urbanizacion y maquinaria pesada.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101112"/>
      <stop offset="1" stop-color="#2b2f33"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="72" y="72" width="120" height="120" rx="10" fill="#f4b400"/>
  <text x="132" y="148" fill="#101112" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="900">UM</text>
  <text x="72" y="280" fill="#f4b400" font-family="Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="3">URBANIZADORA MARMOL MX</text>
  <text x="72" y="360" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="900">Infraestructura, urbanizacion</text>
  <text x="72" y="438" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="900">y maquinaria pesada</text>
  <text x="72" y="510" fill="#c9ced3" font-family="Arial, sans-serif" font-size="30" font-weight="700">Movimiento de tierras, terracerias, compactacion y obra civil en Mexico.</text>
  <rect x="840" y="116" width="300" height="30" fill="#f4b400"/>
  <rect x="900" y="170" width="240" height="30" fill="#f4b400"/>
  <rect x="780" y="224" width="360" height="30" fill="#f4b400"/>
</svg>
